<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Quran</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="UK Quran LMS">
    <link rel="apple-touch-icon" href="Images/Logo/logo.webp">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Preloader overlay shown until login page and background image fully load -->
    <div id="preloader" class="preloader" aria-hidden="false">
        <div class="abstract-canvas">
            <!-- Fine-line structural accent layer -->
            <div class="line-grid"></div>
            
            <!-- Geometries stack -->
            <div class="pill pill-1"></div>
            <div class="pill pill-2"></div>
            <div class="pill pill-3"></div>
            
            <!-- Smooth lighting glow over everything -->
            <div class="lighting-overlay"></div>

            <!-- Preloader Content -->
            <div class="preloader-content">
                <img src="Images/Logo/logo-black-icon.webp" alt="UK Quran" class="preloader-logo" width="100%" height="100%">
                <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
                    <p class="preloader-text">UK Quran</p>
                    <div class="loader-inline1" aria-hidden="true"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="login-container" class="login-container hidden">


        <div id="intro-screen" class="intro-screen">
            <div class="intro-inner">
                <div style="margin-top: 10px;" class="logo"><img src="Images/Logo/logo-black-icon.webp" alt="logo" height="70px" width="70px" style="border-radius: 100px; border: white 4px solid ;"></div>
                <h1>UK Quran</h1>

                

            </div>
            <button id="start-btn" class="next-button">Next</button>
        </div>

        <div id="login-page" class="login-page hidden">
        <!-- Logo Header -->
        <div class="header">
            <div class="logo"><img src="Images/Logo/logo-black-icon.webp" alt="logo" height="70px" width="70px" style="border-radius: 100px; border: white 4px solid ;"></div>
            <h1>UK Quran</h1>
        </div>

        <!-- Role Toggle -->
        <div class="role-toggle">
            <button id="btn-student" class="active">👤 Student</button>
            <button id="btn-teacher">🎓 Teacher</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <!-- Dynamic Labels based on Role -->
            <label1 id="lbl-id" style="color:white;">Student ID</label1>
            <input class="nameinput" type="text" id="input-id" placeholder="name-123" required>

            <label1 id="lbl-password" style="color: white;">PIN</label1>
            <div class="password-container">
                <input type="password" id="input-password" placeholder="••••" required>
                <button type="button" id="togglePassword" class="password-toggle" aria-label="Show password" aria-pressed="false">
                    <svg class="icon-eye icon-eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M12 5c-5.5 0-9.7 3.5-11.5 7 1.8 3.5 6 7 11.5 7s9.7-3.5 11.5-7C21.7 8.5 17.5 5 12 5Zm0 11.5A4.5 4.5 0 1 1 12 8a4.5 4.5 0 0 1 0 9Zm0-2.2A2.3 2.3 0 1 0 12 9.7a2.3 2.3 0 0 0 0 4.6Z"/>
                    </svg>
                    <svg class="icon-eye icon-eye-slash" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2.1 3.5 3.5 2.1l18.4 18.4-1.4 1.4-3.2-3.2c-1.5.5-3 .8-4.3.8-5.5 0-9.7-3.5-11.5-7 .7-1.4 1.8-2.8 3.2-4l-2.6-2.6Zm8.2 8.2 1.9 1.9a2.3 2.3 0 0 0-1.9-1.9Zm2.1-3.8a4.5 4.5 0 0 1 4.4 4.4l2.1 2.1c1.7-1.2 3-2.6 3.8-4-1.8-3.5-6-7-11.5-7-1.1 0-2.3.1-3.5.4l1.8 1.8c.9-.4 1.9-.7 2.9-.7Z"/>
                    </svg>
                </button>
            </div>

            <button type="submit" class="btn-primary1" id="btn">Login ➔</button>
        </form>

        <div class="footer">
            <p>© 2026 UK QURAN • PRIVACY & TERMS</p>
        </div>
    </div>



    <div id="toast-container" class="toast-container"></div>

    <!-- Firebase SDK (Modular V10) -->
    <script>
    // Preloader logic: keep the splash screen visible until the login page is fully ready,
    // while still showing it for at least 10 seconds.
    (function(){
        const preloader = document.getElementById('preloader');
        const loginContainer = document.getElementById('login-container');

        function getBackgroundImageUrls(element){
            try {
                const bg = getComputedStyle(element).backgroundImage || '';
                const urls = [];
                const regex = /url\((['"]?)(.*?)\1\)/g;
                let match;
                while ((match = regex.exec(bg)) !== null) {
                    if (match[2]) urls.push(match[2]);
                }
                return urls;
            } catch (error) {
                return [];
            }
        }

        function loadImage(src){
            return new Promise((resolve) => {
                if (!src) return resolve();
                const img = new Image();
                img.onload = img.onerror = () => resolve();
                img.src = src;
                if (img.complete) resolve();
            });
        }

        function waitForAssets(){
            const imagePromises = Array.from(document.images || []).filter((img) => img.src).map((img) => {
                if (img.complete && img.naturalWidth > 0) return Promise.resolve();
                return new Promise((resolve) => {
                    img.addEventListener('load', resolve, { once: true });
                    img.addEventListener('error', resolve, { once: true });
                });
            });

            const backgroundElements = [document.body, loginContainer];
            const bgUrls = backgroundElements.flatMap((element) => element ? getBackgroundImageUrls(element) : []);
            const bgPromises = bgUrls.map(loadImage);
            return Promise.all([...imagePromises, ...bgPromises]);
        }

        function showLoginPage(){
            if (preloader) {
                preloader.classList.add('preloader-fade');
                setTimeout(() => preloader.remove(), 420);
            }
            if (loginContainer) {
                loginContainer.classList.remove('hidden');
            }
        }

        async function waitForReady(){
            const pageReady = new Promise((resolve) => {
                if (document.readyState === 'complete') return resolve();
                window.addEventListener('load', resolve, { once: true });
            });

            const minimumDelay = new Promise((resolve) => setTimeout(resolve, 3000));
            const assetsReady = waitForAssets();

            await Promise.all([pageReady, assetsReady, minimumDelay]);
            showLoginPage();
        }
                function wireIntroButton() {
            const startBtn = document.getElementById('start-btn');
            const introScreen = document.getElementById('intro-screen');
            const loginPage = document.getElementById('login-page');

            if (!startBtn || !introScreen || !loginPage) return;

            startBtn.addEventListener('click', () => {
                introScreen.classList.add('hidden');
                loginPage.classList.remove('hidden');
                loginContainer.classList.add('gradient-bg');
            });
        }

        waitForReady();
        wireIntroButton();
    })();
    </script>
    <script type="module" src="JavaScript/app.js"></script>
</body>
</html>
