<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Quran LMS - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="UK Quran LMS">
    <link rel="apple-touch-icon" href="logo.webp">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Preloader overlay shown until login page and background image fully load -->
    <div id="preloader" class="preloader" aria-hidden="false">
        <div class="preloader-content">
            <img src="logo.webp" alt="UK Quran" class="preloader-logo" width="84" height="84">
            <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
                <p class="preloader-text">UK Quran</p>

                <div class="loader-inline" aria-hidden="true"></div>
            </div>
        </div>
    </div>
    <div class="login-container">
        <!-- Logo Header -->
        <div class="header">
            <div class="logo"><img src="logo.webp" alt="logo" height="70px" width="70px" style="border-radius: 100px; border: white 4px solid ;"></div>
            <h1>UK Quran</h1>
        </div>

        <!-- Role Toggle -->
        <div class="role-toggle">
            <button id="btn-student" class="active">👤 Student</button>
            <button id="btn-teacher">🎓 Teacher</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <!-- Dynamic Labels based on Role -->
            <label id="lbl-id" style="color:white;">Student ID</label>
            <input class="nameinput" type="text" id="input-id" placeholder="name-123" required>

            <label id="lbl-password" style="color: white;">PIN</label>
            <div class="password-container">
                <input type="password" id="input-password" placeholder="••••" required>
                <button type="button" id="togglePassword" class="password-toggle" aria-label="Show password" aria-pressed="false">
                    <svg class="icon-eye icon-eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M12 5c-5.5 0-9.7 3.5-11.5 7 1.8 3.5 6 7 11.5 7s9.7-3.5 11.5-7C21.7 8.5 17.5 5 12 5Zm0 11.5A4.5 4.5 0 1 1 12 8a4.5 4.5 0 0 1 0 9Zm0-2.2A2.3 2.3 0 1 0 12 9.7a2.3 2.3 0 0 0 0 4.6Z"/>
                    </svg>
                    <svg class="icon-eye icon-eye-slash" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2.1 3.5 3.5 2.1l18.4 18.4-1.4 1.4-3.2-3.2c-1.5.5-3 .8-4.3.8-5.5 0-9.7-3.5-11.5-7 .7-1.4 1.8-2.8 3.2-4l-2.6-2.6Zm8.2 8.2 1.9 1.9a2.3 2.3 0 0 0-1.9-1.9Zm2.1-3.8a4.5 4.5 0 0 1 4.4 4.4l2.1 2.1c1.7-1.2 3-2.6 3.8-4-1.8-3.5-6-7-11.5-7-1.1 0-2.3.1-3.5.4l1.8 1.8c.9-.4 1.9-.7 2.9-.7Z"/>
                    </svg>
                </button>
            </div>

            <button type="submit" class="btn-primary1" id="btn">Login ➔</button>
        </form>

        <div class="footer">
            <p>© 2026 UK QURAN • PRIVACY & TERMS</p>
        </div>
    </div>

    <div id="a2hs-prompt" class="a2hs-prompt " aria-live="polite">
        <div class="a2hs-card">
            <div class="a2hs-content">
                <span class="a2hs-icon">📱</span>
                <div>
                    <p class="a2hs-title">Add UK Quran to your Home Screen</p>
                    <p id="a2hs-description" class="a2hs-description">Install the app for faster access and a better experience.</p>
                </div>
            </div>
            <div class="a2hs-actions">
                <button id="btn-add-home" class="btn-primary" type="button">Add</button>
                <button id="btn-dismiss-a2hs" class="btn-link" type="button">Maybe later</button>
                <button id="btn-already-added" class="btn-link2" type="button">Already added</button>
            </div>
            <p id="ios-a2hs-tip" class="a2hs-ios-tip hidden">Tap the share icon, then choose <strong>Add to Home Screen</strong>.</p>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Firebase SDK (Modular V10) -->
    <script>
    // Preloader logic: wait for window load and CSS background image
    (function(){
        const preloader = document.getElementById('preloader');
        function getBgImageUrl(){
            try{
                const bg = getComputedStyle(document.body).backgroundImage || '';
                const m = bg.match(/url\((['"]?)(.*)\1\)/);
                return m ? m[2] : null;
            }catch(e){ return null; }
        }
        function loadImage(src){
            return new Promise((resolve) => {
                if(!src) return resolve();
                const img = new Image();
                img.onload = img.onerror = () => resolve();
                img.src = src;
                if (img.complete) resolve();
            });
        }

        async function waitForReady(){
            // Wait for full window load
            await new Promise(r => { if (document.readyState === 'complete') return r(); window.addEventListener('load', r); });
            // Ensure background image loaded
            const bg = getBgImageUrl();
            await loadImage(bg);
            // Small visual delay and fade-out
            if(preloader){ preloader.classList.add('preloader-fade'); setTimeout(()=>{ preloader.remove(); }, 420); }
        }

        // Kick off
        waitForReady();
    })();
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
