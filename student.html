<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Student Specific Styles */
        .greeting { padding: 20px 20px 0; }
        .greeting h1 { color: var(--primary-orange); font-size: 22px; margin: 0 0 5px; }
        .greeting p { color: var(--text-muted); font-size: 13px; margin: 0; }
        
        .student-action-card { background: var(--white); margin: 20px; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .student-action-card h3 { margin: 0 0 20px; font-size: 16px; color: #5C4B37; display: flex; align-items: center; gap: 8px;}
        
        .stepper-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f4f5f7; padding: 10px; border-radius: 12px;}
        .stepper-label { font-weight: 600; font-size: 14px; color: #333; }
        .stepper-controls { display: flex; align-items: center; gap: 10px; }
        .stepper-controls button { width: 35px; height: 35px; border-radius: 50%; border: none; background: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: var(--primary-orange);}
        .stepper-controls input { width: 40px; text-align: center; border: none; background: transparent; font-size: 18px; font-weight: bold; margin: 0; padding: 0; pointer-events: none;}
        
        .attendance-toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border: 1px solid #eaeaea; border-radius: 12px; }
        .toggle-btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; background: #f1f3f4; color: #888; transition: 0.2s;}
        .toggle-btn.active { background: #34A853; color: white; }
        .heard-by-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f3f3f3; }
        .heard-by-row label { min-width: 90px; color: #4b5563; font-size: 13px; font-weight: 600; }
        .heard-by-row input { flex: 1 1 100%; max-width: 100%; border: 1px solid #d1d5db; border-radius: 10px; padding: 10px 12px; font-size: 14px; color: #111827; }
    </style>
</head>
<body>

<div class="app-container">

    <!-- Header -->
    <header class="dash-header">
        <div class="user-info">
            <div class="avatar" style="background: #4A90E2;">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="white"/></svg>
            </div>
            <div>
                <h2 id="student-header-name">Loading...</h2>
                <p id="student-header-id">ID: ...</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="btn-logout" title="Logout">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path><path d="M9 19H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4"></path></svg>
            </button> 
        </div>
    </header>

    <div class="greeting">
        <h1 id="greeting-text">Assalaamu Alaikum..</h1>
        <p id="current-month-text">Submit your progress for today.</p>
    </div>

    <!-- Daily Entry Card -->
    <div class="student-action-card">
        <h3>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            Today's Learning
        </h3>
        
        <div class="attendance-toggle-row">
            <span class="stepper-label">Mark Attendance Today</span>
            <div class="toggle-p-a">
                <button type="button" id="btn-mark-present">Present</button>
                <button type="button" id="btn-mark-absent" class="active-a">Absent</button>
            </div>
        </div>

        <div class="stepper-row">
            <span class="stepper-label">New Pages</span>
            <div class="stepper-controls">
                <select id="inp-new" class="page-select" aria-label="New pages"></select>
            </div>
        </div>

        <div class="stepper-row">
            <span class="stepper-label">Revision Pages</span>
            <div class="stepper-controls">
                <select id="inp-rev" class="page-select" aria-label="Revision pages"></select>
            </div>
        </div>
        <div class="heard-by-row">
            <label for="inp-rev-heard-by">Heard by</label>
            <input type="text" id="inp-rev-heard-by" placeholder="Enter name">
        </div>

        <button class="btn-primary" id="btn-submit-progress" style="width: 100%; background:  #47c845;">Submit Progress</button>
    </div>

    <!-- Monthly History Table -->
    <div class="greeting" style="padding-top: 0;">
        <h1 style="font-size: 18px;">Monthly Progress</h1>
    </div>
    
    <div class="table-container" style="margin-bottom: 40px;">
        <table class="excel-table">
            <thead>
                <tr>
                    <th class="th-blue sticky-col">Date</th>
                    <th class="th-blue">New</th>
                    <th class="th-blue">Rev</th>
                    <th class="th-blue">Present</th>
                    <th class="th-blue">Absent</th>
                    <th class="th-blue">Teacher Remarks</th>
                </tr>
            </thead>
            <tbody id="history-table-body">
                <!-- Javascript will inject history here -->
            </tbody>
        </table>
    </div>

</div>

<!-- Toast Notification Container -->
<div id="toast-container" class="toast-container"></div>

<script type="module" src="student.js"></script>
</body>
</html>
