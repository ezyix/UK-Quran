<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THAJWEED CLASS</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
.video-list { 
  display: flex; 
  flex-direction: row; 
  flex-wrap: wrap; 
  gap: 15px; 
  margin-top: 10px; 
 
} 
@media (max-width: 320px) {
  .video-list {
  display: flex; 
  flex-direction: row; 
  flex-wrap: wrap; 
  margin-top: 10px; 
  gap: 0px; 
  }
  }


  
        .video-card { width: 37%; display: flex; flex-direction: column; gap: 10px; background: #ffffff; border-radius: 18px; padding: 18px; box-shadow: 0 14px 35px rgba(0,0,0,0.08); }
        .video-card-row { display: flex; flex-direction: column; gap: 12px;justify-content: flex-start; }
        .video-thumb { width: 100%; height: 100px; object-fit: cover; border-radius: 12px; display: block; }
        .thumb-wrap { position: relative; width: 100%; max-width: 230px; }
        .play-overlay { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border: 0; padding: 0; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-overlay svg { width: 18px; height: 18px; fill: #fff; }
        .student-action-card { background: white; margin: 10px; border-radius: 16px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .lesson-1{background-image: url(../../Images/Banner/lesson-1-banner.webp);background-size: 100% 100%;border-radius: 16px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
        .student-action-card h3 { margin: 0 0 20px; font-size: 16px; color: #5C4B37; display: flex; align-items: center; gap: 8px; position: relative; padding-right: 28px;}
        .student-action-card h3 { cursor: pointer; }
        .student-action-card h3::after {
            content: '▾';
            position: absolute;
            right: 12px;
            font-size: 16px;
            transition: transform 0.2s ease;
            color: #5C4B37;
        }
        .student-action-card.open h3::after {
            transform: rotate(180deg);
        }
        .student-action-card .video-list { display: none; }
        .student-action-card.open .video-list { display: flex; }
        

        /* Modal (lightbox) */
        .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .modal.open { display: flex; }
        .modal-content { position: relative; width: 90%; max-width: 920px; padding-top: 20px; }
        .modal-img { width: 100%; height: auto; border-radius: 12px; display: block; }
        .modal-close { position: absolute; right: 16px; top: 16px; width: 36px; height: 36px; background: #fff; border-radius: 50%; display:flex;align-items:center;justify-content:center;cursor:pointer; box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
        .modal-actions-bar { position: absolute; right: 72px; top: 16px; display: flex; gap: 8px; z-index: 3; }
        .modal-download, .modal-fullscreen { width: 36px; height: 36px; min-width: 0; border: 0; border-radius: 50%; background: #fff; color: #111827; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
        .modal-download { text-decoration: none; }
        .modal-download:hover, .modal-fullscreen:hover, .modal-close:hover { background: #f3f4f6; }
        .modal-download svg, .modal-fullscreen svg { width: 18px; height: 18px; stroke: currentColor; }
        .modal-play { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 64px; height: 64px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .modal-play svg { width: 32px; height: 32px; fill: #fff; }
        .modal video { width: 100%; height: auto; border-radius: 12px; display: block; }
        .video-player { width: 100%; height: auto; border-radius: 12px; display: block; }
        .thumb-wrap .video-player { height: 100px; object-fit: cover; background: #000; }
        .video-meta { display: flex; flex-direction: column; gap: 8px; align-items: center; text-align: center; }
        .video-title { font-size: 14px; font-weight: 700; color: #1f2937; line-height: 1.4; }
        .video-actions { display: flex; flex-wrap: wrap; gap: 10px; }
        .video-link { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; background: #4A90E2; color: #fff; border-radius: 14px; text-decoration: none; font-size: 13px; font-weight: 700; transition: background 0.2s ease; }
        .video-link:hover { background: #146acd; }
        .video-help { margin: 0; color: #6b7280; font-size: 13px; padding: 0 20px 10px; }
        .video-count { color: #4A90E2; font-weight: 700; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="dash-header">
            <div class="user-info">
                <div>
                    <h2 style="margin:0;">THAJWEED CLASS</h2>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btn-back" type="button" aria-label="Go back">←</button>
            </div>
        </header>
    <div class="student-action-card">
        <div class="lesson-1">
        <h3 style="margin-left: 22px; margin-top: 20px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            Lesson 1
        </h3>
        <p style="margin-left: 22px; margin-right: 22px; font-size: 14px;">
            Arabic letters
        </p>
        </div>
        
        <div class="video-list" id="video-list"></div> 
    </div> 
    <script> 
        const videoFiles = [
            'PART- 1.mp4',
            'PART- 2.mp4',
            'PART- 3.mp4',
            'PART- 4.mp4',
            'PART- 5.mp4',
            'PART- 6.mp4',
            'PART- 7.mp4',
            'PART- 8.mp4',
            'PART- 9.mp4',
            'PART- 10.mp4',
            'PART- 11.mp4',
            'PART- 12.mp4',
            'PART- 13.mp4',
            'PART- 14.mp4',
            'PART- 15.mp4',
            'PART- 16.mp4',
            'PART- 17.mp4',
            'PART- 18.mp4',
            'PART- 19.mp4',
            'PART- 20.mp4',
            'PART- 21.mp4',
            'PART- 22.mp4',
            'PART- 23.mp4',
            'PART- 24.mp4',
            'PART- 25.mp4',
            'PART- 26.mp4',
            'PART- 27.mp4',
            'PART- 28.mp4'
        ];

        function extractPartNumber(name) {
            const match = name.match(/PART\s*-?\s*(\d+)/i);
            return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
        }

        videoFiles.sort((a, b) => {
            const diff = extractPartNumber(a) - extractPartNumber(b);
            return diff !== 0 ? diff : a.localeCompare(b, undefined, { sensitivity: 'base' });
        });

        const videoList = document.getElementById('video-list');
        const defaultThumb = '../../Images/Arabic-letters/PART- 2.webp';
        const thumbSrc = (partNum) => `../../Images/Arabic-letters/PART- ${partNum}.webp`;

        function getVideoUrl(fileName) {
            return '../../Videos/Arabic-letters/' + encodeURIComponent(fileName);
        }

        videoFiles.forEach((fileName, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';

            const row = document.createElement('div');
            row.className = 'video-card-row';

            const partNum = extractPartNumber(fileName);
            const thumb = document.createElement('img');
            thumb.className = 'video-thumb';
            thumb.src = partNum !== Number.MAX_SAFE_INTEGER ? thumbSrc(partNum) : defaultThumb;
            thumb.alt = 'Thumbnail for part ' + (index + 1);
            thumb.onerror = () => {
                thumb.onerror = null;
                thumb.src = defaultThumb;
            };

            const thumbWrap = document.createElement('div');
            thumbWrap.className = 'thumb-wrap';
            thumbWrap.appendChild(thumb);

            const playButton = document.createElement('button');
            playButton.className = 'play-overlay';
            playButton.type = 'button';
            playButton.setAttribute('aria-label', 'Play ' + (partNum !== Number.MAX_SAFE_INTEGER ? `class ${partNum}` : `class ${index + 1}`));
            playButton.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>';
            thumbWrap.appendChild(playButton);

            const title = document.createElement('div');
            title.className = 'video-title';
            if (partNum !== Number.MAX_SAFE_INTEGER) {
                title.textContent = `Class - ${partNum}`;
            } else {
                title.textContent = `Class - ${index + 1}`;
            }

            const meta = document.createElement('div');
            meta.className = 'video-meta';
            meta.appendChild(title);

            playButton.addEventListener('click', () => {
                openModal(fileName);
            });

            row.appendChild(thumbWrap);
            row.appendChild(meta);
            card.appendChild(row);
            videoList.appendChild(card);
        });

        document.getElementById('btn-back').addEventListener('click', () => {
            window.location.href = '../Student/student.html';
        });

        // make lesson cards collapsible; start closed by default
        (function setupLessonCollapse(){
            const cards = document.querySelectorAll('.student-action-card');
            cards.forEach((card) => {
                card.addEventListener('click', (event) => {
                    const ignoreClick = event.target.closest('.video-list, .thumb-wrap, .video-actions, button, a, audio, input');
                    if (ignoreClick) return;
                    card.classList.toggle('open');
                });
            });
        })();

        // --- Modal creation and behavior ---
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <div class="modal-close">✕</div>
                <div class="modal-actions-bar">
                    <a class="modal-download" href="#" download aria-label="Download video">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
                    </a>
                    <button class="modal-fullscreen" type="button" aria-label="Open fullscreen">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="m21 3-7 7"></path><path d="M9 21H3v-6"></path><path d="m3 21 7-7"></path></svg>
                    </button>
                </div>
                <img class="modal-img" src="" alt="thumbnail" />
                <div class="modal-play"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
        `;
        document.body.appendChild(modal);

        const modalContent = modal.querySelector('.modal-content');
        const modalImg = modal.querySelector('.modal-img');
        const modalPlay = modal.querySelector('.modal-play');
        const modalClose = modal.querySelector('.modal-close');
        const modalDownload = modal.querySelector('.modal-download');
        const modalFullscreen = modal.querySelector('.modal-fullscreen');

        function lockBodyScroll() {
            document.body.classList.add('modal-open');
        }

        function unlockBodyScroll() {
            if (!document.querySelector('.modal-overlay:not(.hidden), .modal.open')) {
                document.body.classList.remove('modal-open');
            }
        }

        function pushModalState() {
            if (!history.state || !history.state.modalOpen) {
                history.pushState({ modalOpen: true }, '');
            }
        }

        function openModal(fileName) {
            const existingVideo = modalContent.querySelector('video');
            if (existingVideo) existingVideo.remove();

            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.src = getVideoUrl(fileName);

            modalContent.insertBefore(video, modalPlay);
            modalImg.style.display = 'none';
            modalPlay.style.display = 'none';
            modal.dataset.file = fileName;
            modalDownload.href = getVideoUrl(fileName);
            modalDownload.download = fileName;
            modal.classList.add('open');
            lockBodyScroll();
            pushModalState();
        }

        function closeModal() {
            // stop and remove video if playing
            const v = modalContent.querySelector('video');
            if (v) {
                try { v.pause(); } catch (e) {}
                v.remove();
            }
            modal.classList.remove('open');
            unlockBodyScroll();
        }

        function closeModalWithHistory() {
            if (history.state && history.state.modalOpen) {
                history.back();
            } else {
                closeModal();
            }
        }

        window.addEventListener('popstate', () => {
            if (modal.classList.contains('open')) {
                closeModal();
            }
        });

        modalClose.addEventListener('click', closeModalWithHistory);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModalWithHistory();
        });

        modalFullscreen.addEventListener('click', () => {
            const video = modalContent.querySelector('video');
            if (!video) return;

            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        });

    </script>
</body>
</html>
