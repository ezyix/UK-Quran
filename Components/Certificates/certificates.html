<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Certificates</title>
<link rel="stylesheet" href="/UK-Quran/style.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    .menu-btn { font-size: 22px; line-height: 1; width: 42px; height: 42px; border-radius: 50%; border: none; background: transparent; color: #111; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .menu-btn:hover { background: rgba(0, 0, 0, 0.05); }
    .menu-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.24); opacity: 0; visibility: hidden; transition: opacity 0.28s ease; z-index: 1050; }
    .menu-backdrop.open { opacity: 1; visibility: visible; }
    .side-menu { position: fixed; top: 0; right: -100%; width: 60vw; max-width: 340px; height: 100vh; background: #fff; box-shadow: -18px 0 45px rgba(0,0,0,0.12); z-index: 1100; transition: right 0.28s ease; display: flex; flex-direction: column; padding: 32px 32px 28px; }
    .side-menu.open { right: 0; }
    .side-menu .menu-close-btn { margin-left: auto; border: none; background: transparent; font-size: 28px; line-height: 1; color: #333; cursor: pointer; }
    .side-menu .menu-title { margin: 0; font-size: 22px; letter-spacing: 0.18em; text-transform: uppercase; color: #888; font-weight: 700; }
    .side-menu .menu-list { margin-top: 48px; display: flex; flex-direction: column; gap: 28px; }
    .side-menu .menu-list button { border: none; background: transparent; text-align: left; color: #111; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; padding: 0; cursor: pointer; }
    .side-menu .menu-list button + button { padding-top: 28px; border-top: 1px solid rgba(0,0,0,0.08); }
    .side-menu .menu-list button:hover { color: #0f4ad6; }
</style>
</head>
<body>
<div class="app-container">
    <header class="dash-header">
        <button class="icon-btn" id="btn-back" title="Go Back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8E785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <h2 style="margin:0; font-size:18px; color: #5C4B37;">My Certificates</h2>
        <button class="menu-btn" id="btn-menu" aria-label="Open menu">☰</button>
    </header>

    <div id="certificates-menu-backdrop" class="menu-backdrop"></div>
    <aside id="certificates-side-menu" class="side-menu" aria-hidden="true">
        <button type="button" class="menu-close-btn" id="btn-menu-close">×</button>
        <p class="menu-title">UK QURAN</p>
        <div class="menu-list">
            <button type="button" id="btn-menu-home">HOME</button>
            <button type="button" id="btn-menu-thajweed">THAJWEED</button>
            <button type="button" id="btn-menu-qiraat">QIRA'AT</button>
            <button type="button" id="btn-menu-certificates">CERTIFICATES</button>
            <button type="button" id="btn-menu-logout">LOGOUT</button>
        </div>
    </aside>

    <div id="certificates-list" style="padding:20px;">
        <p style="color:#888; font-size:13px;">Loading your certificates...</p>
    </div>
</div>
<script type="module" src="certificates.js"></script>
</body>
</html>
