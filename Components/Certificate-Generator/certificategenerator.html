<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK-QURAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="certificategenerator.css">
</head>
<body>

<!-- Ambient decorative backdrop -->
<div class="backdrop" aria-hidden="true">
  <div class="motif motif--tl"></div>
  <div class="motif motif--br"></div>
</div>

<header class="page-head">
  <div class="brand-mark" aria-hidden="true">
    <svg viewBox="0 0 48 48" width="34" height="34">
      <path d="M24 2 L28 20 L46 24 L28 28 L24 46 L20 28 L2 24 L20 20 Z" fill="url(#goldGrad)"/>
      <defs>
        <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#f3d98b"/>
          <stop offset="1" stop-color="#b8912f"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <p class="eyebrow">UK &middot; Qur'an Learning</p>
  <h1 class="page-title">Certificate Generator</h1>
</header>

<main class="layout">

  <!-- FORM CARD -->
  <section class="panel form-panel" aria-labelledby="form-heading">
    <h2 id="form-heading" class="panel-heading">Certificate Details</h2>

    <form id="certForm" novalidate>
      <div class="field">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" name="studentName" placeholder="e.g. MUHAMMED / محمد" autocomplete="off">
        <span class="field-error" id="err-studentName"></span>
      </div>

      <div class="field">
        <label for="juzName">Juz Completed</label>
        <input type="text" id="juzName" name="juzName" placeholder="e.g. THABARK / تبارك" autocomplete="off">
        <span class="field-error" id="err-juzName"></span>
      </div>

      <div class="field">
        <label for="certDate">Date</label>
        <input type="date" id="certDate" name="certDate">
        <span class="field-error" id="err-certDate"></span>
      </div>

      <div class="button-row">
        <button type="submit" class="btn btn-gold" id="generateBtn">
          <span>Generate Certificate</span>
        </button>
        <button type="button" class="btn btn-ghost" id="resetBtn">Reset</button>
      </div>
    </form>
  </section>

  <!-- PREVIEW CARD -->
  <section class="panel preview-panel" aria-labelledby="preview-heading">
    <h2 id="preview-heading" class="panel-heading">Preview</h2>

    <div class="canvas-frame" id="canvasFrame">
      <canvas id="certCanvas"></canvas>
      <div class="canvas-placeholder" id="canvasPlaceholder">
        <svg viewBox="0 0 64 64" width="46" height="46" aria-hidden="true">
          <rect x="6" y="6" width="52" height="52" rx="4" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.6"/>
          <path d="M6 44 L22 28 L32 38 L44 24 L58 40" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.6"/>
          <circle cx="20" cy="18" r="4" fill="#c9a227" opacity="0.6"/>
        </svg>
        <p>Your certificate preview will appear here</p>
      </div>
    </div>

    <div class="button-row button-row--actions">
      <button type="button" class="btn btn-navy" id="downloadBtn" disabled>
        <span>Download Certificate</span>
      </button>
    </div>
  </section>

</main>

<footer class="page-foot">
</footer>

<canvas id="workCanvas" style="display:none;"></canvas>

<script src="certificategenerator.js"></script>
</body>
</html>
