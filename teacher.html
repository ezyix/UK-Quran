<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">

    <!-- Top Header -->
    <header class="dash-header">
        <div class="user-info">
            <div class="avatar">
                <img src="ChatGPT Image Jul 8, 2026, 12_31_21 PM.png" alt="logo" height="55px" width="55px" style="border-radius: 100px;  margin: white;">

            </div>
            <div>
                <h2>Welcome, Ustad</h2>
                <p id="current-date">Date</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="btn-logout" title="Logout">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 17l5-5-5-5"></path>
                    <path d="M21 12H9"></path>
                    <path d="M9 19H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Summary Section -->
    <section class="summary-section">
        <div class="summary-card">
            <span class="summary-label">TOTAL<br>STUDENTS</span>
            <h3 class="summary-value" id="total-students">0</h3>
        </div>
        <div class="summary-card highlight-green">
            <span class="summary-label">PRESENT<br>TODAY</span>
            <h3 class="summary-value" id="present-students">0</h3>
        </div>
        <div class="action-buttons">
            <button class="btn-light" id="btn-mark-all">Mark All Present</button>

            <button class="btn-outline" id="btn-add-student" style="display: inline-flex; align-items: center; justify-content: center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Student
            </button>

            <button class="btn-outline" id="btn-view-reports" style="display: inline-flex; align-items: center; justify-content: center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                    <line x1="12" y1="20" x2="12" y2="10"></line>
                    <line x1="18" y1="20" x2="18" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                View Reports
            </button>
        </div>
    </section>

    <section class="student-search-section">
        <input type="text" id="student-search" class="student-search-input" placeholder="Search student by name">
    </section>

    <!-- Student List Container -->
    <section class="student-list" id="student-list">
        <!-- JS injects students here -->
    </section>

    <!-- Save Button -->
    <div class="save-container">
        <button class="btn-primary full-width" id="btn-save-report">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="vertical-align: middle; margin-right: 8px;">
                <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
            </svg>
            <span id="btn-save-label">Save Daily Report</span>
        </button>
    </div>

    <!-- Add Student Modal -->
    <div id="add-student-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Add New Student</h3>
            <form id="add-student-form">
                <label>Student Name</label>
                <input type="text" id="new-student-name" placeholder="e.g. Yasin" minlength="3" required>
                <small id="new-student-name-hint" class="field-hint">Name must be at least 3 characters.</small>

                <label>Student ID</label>
                <input type="text" id="new-student-id" placeholder="e.g. 1001" required>

                <label>Login PIN</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="new-student-pin" placeholder="e.g. 1234" minlength="4" required>
                <small id="new-student-pin-hint" class="field-hint">PIN must be at least 4 digits.</small>

                <div class="modal-actions">
                    <button type="button" class="btn-outline" id="btn-cancel-add">Cancel</button>
                    <button type="submit" class="btn-primary" style="margin-top:0;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="delete-student-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Remove Student?</h3>
            <p style="font-size:13px; color:#8E785C; margin:0 0 20px;">
                This will permanently delete <strong id="delete-student-name">this student</strong> and all of their attendance history. This cannot be undone.
            </p>
            <div class="modal-actions">
                <button type="button" class="btn-outline" id="btn-cancel-delete">Cancel</button>
                <button type="button" class="btn-danger" id="btn-confirm-delete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>
</div>

<script type="module" src="teacher.js"></script>
</body>
</html>
